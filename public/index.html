<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatting Bots Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Chatting Bots Admin</h1>
      <div class="header-right">
        <span id="status-badge" class="badge badge-off">Offline</span>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">☀</button>
      </div>
    </header>

    <nav>
      <button class="nav-btn active" data-tab="dashboard">Dashboard</button>
      <button class="nav-btn" data-tab="bots">Bots</button>
      <button class="nav-btn" data-tab="settings">Settings</button>
    </nav>

    <main>
      <!-- Dashboard -->
      <section id="tab-dashboard" class="tab active">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="stat-total-bots">0</div>
            <div class="stat-label">Total Bots</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-active-bots">0</div>
            <div class="stat-label">Active Bots</div>
          </div>
        </div>

        <div class="card">
          <h3>Quick Actions</h3>
          <div class="action-row">
            <button class="btn-primary" onclick="startAllBots()">Start All Bots</button>
            <button class="btn-danger" onclick="stopAllBots()">Stop All Bots</button>
            <button class="btn-secondary" onclick="refreshDashboard()">Refresh</button>
          </div>
        </div>

        <div class="card">
          <h3>Current Topic</h3>
          <div class="topic-display" id="current-topic">Loading...</div>
          <div class="topic-edit">
            <input type="text" id="new-topic" placeholder="Enter new topic..." />
            <button class="btn-primary" onclick="updateTopic()">Update Topic</button>
          </div>
        </div>
      </section>

      <!-- Bots -->
      <section id="tab-bots" class="tab">
        <div class="card">
          <h3>Add Bot</h3>
          <div class="form-group" style="margin-bottom:0.8rem">
            <label>Bot Name</label>
            <input type="text" id="bot-name" placeholder="e.g. MySelf" />
          </div>
          <div class="form-group" style="margin-bottom:0.8rem">
            <label>User Token</label>
            <input type="password" id="bot-token" placeholder="Paste your Discord user token here" />
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label>Personality</label>
              <select id="bot-personality">
                <option value="friendly">Friendly</option>
                <option value="funny">Funny</option>
                <option value="chill">Chill</option>
                <option value="nerdy">Nerdy</option>
                <option value="sarcastic">Sarcastic</option>
                <option value="hype">Hype</option>
                <option value="quiet">Quiet</option>
              </select>
            </div>
            <div class="form-group" style="display:flex;align-items:flex-end">
              <button class="btn-primary" style="width:100%" onclick="addBot()">Add Bot</button>
            </div>
          </div>
          <div style="font-size:0.75rem;color:var(--text-dim);margin-top:0.6rem">
            Server &amp; Channel are set globally in Settings tab. All bots use the same server/channel.
          </div>
        </div>

        <div class="card">
          <h3>Bot List</h3>
          <div id="bot-list" class="bot-list"></div>
        </div>
      </section>

      <!-- Settings -->
      <section id="tab-settings" class="tab">
        <div class="card">
          <h3>Discord Server</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Server / Guild ID</label>
              <input type="text" id="set-server_id" placeholder="Right-click server > Copy ID" />
            </div>
            <div class="form-group">
              <label>Channel ID</label>
              <input type="text" id="set-channel_id" placeholder="Right-click channel > Copy ID" />
            </div>
          </div>
        </div>

        <div class="card">
          <h3>Chat Behavior</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Min Delay (ms between messages)</label>
              <input type="number" id="set-min_delay" />
            </div>
            <div class="form-group">
              <label>Max Delay (ms between messages)</label>
              <input type="number" id="set-max_delay" />
            </div>
            <div class="form-group">
              <label>Typing Duration Min (ms)</label>
              <input type="number" id="set-typing_min" />
            </div>
            <div class="form-group">
              <label>Typing Duration Max (ms)</label>
              <input type="number" id="set-typing_max" />
            </div>
            <div class="form-group">
              <label>Max Message Length</label>
              <input type="number" id="set-max_length" />
            </div>
            <div class="form-group">
              <label>Typing Pause When Member Posts (ms)</label>
              <input type="number" id="set-typing_pause_ms" />
            </div>
          </div>
        </div>

        <div class="card">
          <h3>Conversation Behavior</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Reaction Chance (%)</label>
              <input type="number" id="set-reaction_chance" min="0" max="100" />
            </div>
            <div class="form-group">
              <label>Discord Reply Chance (%)</label>
              <input type="number" id="set-reply_chance" min="0" max="100" />
            </div>
            <div class="form-group">
              <label>First Reply Delay Min (ms)</label>
              <input type="number" id="set-reply_delay_min" />
            </div>
            <div class="form-group">
              <label>First Reply Delay Max (ms)</label>
              <input type="number" id="set-reply_delay_max" />
            </div>
            <div class="form-group">
              <label>Follow-Up Delay Min (ms)</label>
              <input type="number" id="set-follow_up_delay_min" />
            </div>
            <div class="form-group">
              <label>Follow-Up Delay Max (ms)</label>
              <input type="number" id="set-follow_up_delay_max" />
            </div>
          </div>
        </div>

        <div class="card">
          <h3>Talking Style</h3>
          <div class="form-group">
            <label>Custom Prompt — instructions for how bots should talk</label>
            <textarea id="set-custom_prompt" rows="5" placeholder="e.g. talk like gen z, use internet slang, be sarcastic"></textarea>
          </div>
        </div>

        <button class="btn-primary" onclick="saveSettings()">Save Settings</button>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
